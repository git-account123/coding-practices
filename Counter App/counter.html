<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter app</title>
    <script type="module" defer src="counter.js"></script>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #container{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
        }
 .btn{
            padding: 10px 20px;
            border-radius: 13px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Counter APP</h1>
    <div id="container">
        <button id="increment">+</button>
        <p id="count"></p>
        <button id="decrement">-</button>
    </div>
</body>
</html>
